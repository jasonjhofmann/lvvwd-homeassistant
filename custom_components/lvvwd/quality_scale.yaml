# Integration Quality Scale self-assessment (custom integration — not
# officially scored; tracked against the core checklist). Target: GOLD.
# The three Platinum rules (strict-typing, inject-websession, async-dependency)
# are deferred for v0.1 — see their "todo" entries.
rules:
  # Bronze
  action-setup:
    status: exempt
    comment: No custom service actions.
  appropriate-polling:
    status: done
    comment: 12-hour coordinator interval against a portal whose monthly data
      changes once a billing cycle and whose daily window lags ~3 days.
  brands:
    status: done
    comment: In-tree brand assets (custom_components/lvvwd/brand/, original
      water-droplet artwork — NOT the LVVWD/SNWA logo — generated by
      scripts/generate_brand.py); central brands PRs auto-close for custom
      integrations.
  common-modules:
    status: done
    comment: coordinator.py + entity.py (LvvwdEntity base).
  config-flow:
    status: done
  config-flow-test-coverage:
    status: done
    comment: User, reauth, and options flows tested (happy paths, invalid
      auth, duplicates, recovery).
  dependency-transparency:
    status: done
    comment: No third-party runtime dependency; the scraper uses HA-bundled
      requests via the executor (manifest requirements is empty).
  docs-actions:
    status: exempt
    comment: No custom service actions.
  docs-high-level-description:
    status: done
    comment: README overview — usage-only Tier-0 statistics plus an opt-in
      penny-accurate cost statistic.
  docs-installation-instructions:
    status: done
    comment: README HACS custom-repository steps.
  docs-removal-instructions:
    status: done
    comment: README Removal section.
  entity-event-setup:
    status: exempt
    comment: No event subscriptions.
  entity-unique-id:
    status: done
    comment: Account-scoped; entity unique IDs derive from the account
      unique_id (username).
  has-entity-name:
    status: done
  runtime-data:
    status: done
    comment: entry.runtime_data holds the coordinator.
  test-before-configure:
    status: done
    comment: Credentials validated by a live login in the config flow.
  test-before-setup:
    status: done
    comment: Coordinator does a first refresh at setup; auth failure raises
      ConfigEntryAuthFailed (reauth), a scrape/transport failure raises
      UpdateFailed.
  unique-config-entry:
    status: done
    comment: unique_id = username.strip().lower(); duplicate accounts abort
      with already_configured.

  # Silver
  action-exceptions:
    status: exempt
    comment: No custom service actions.
  config-entry-unloading:
    status: done
  docs-configuration-parameters:
    status: done
    comment: README Options section documents meter size and the cost opt-in.
  docs-installation-parameters:
    status: done
    comment: README Parameters table (portal username/password).
  entity-unavailable:
    status: done
    comment: Coordinator-driven availability.
  integration-owner:
    status: done
  log-when-unavailable:
    status: done
    comment: DataUpdateCoordinator built-in once-per-transition logging.
  parallel-updates:
    status: done
    comment: PARALLEL_UPDATES = 0 in sensor.py.
  reauthentication-flow:
    status: done
  test-coverage:
    status: done
    comment: CI enforces --cov-fail-under=80 on the matrix (3.13 + 3.14).

  # Gold
  devices:
    status: done
    comment: One service device per account entry.
  diagnostics:
    status: done
    comment: diagnostics.py — username/password redacted; coordinator data
      (monthly/daily/data_through) and update health included.
  discovery:
    status: exempt
    comment: Cloud account; nothing locally discoverable.
  discovery-update-info:
    status: exempt
    comment: No discovery.
  docs-data-update:
    status: done
    comment: README documents the 12-hour poll, ~4-week daily window, ~3-day
      lag, and the current-Pacific-day skip.
  docs-examples:
    status: done
    comment: README Energy-dashboard wiring example (water source + optional
      cost).
  docs-known-limitations:
    status: done
    comment: README Known limitations (short daily history, no MFA, non-1"
      cost unvalidated-from-source, unofficial/ToS disclaimer).
  docs-supported-devices:
    status: done
    comment: README — any LVVWD residential myaccount.lvvwd.com customer.
  docs-supported-functions:
    status: done
    comment: README Statistics/Entities section.
  docs-troubleshooting:
    status: done
    comment: README Troubleshooting section.
  docs-use-cases:
    status: done
    comment: README Energy-dashboard use case.
  dynamic-devices:
    status: exempt
    comment: Single account device; no dynamically discovered sub-devices.
  entity-category:
    status: done
    comment: Measurement sensors plus a diagnostic "data through" timestamp.
  entity-device-class:
    status: done
    comment: Volume/timestamp device classes applied where HA units permit.
  entity-disabled-by-default:
    status: done
    comment: Small entity set; nothing noisy enough to pre-disable.
  entity-translations:
    status: done
  exception-translations:
    status: done
    comment: Coordinator raises translation-keyed errors (invalid_auth,
      scrape_failed); exceptions section in strings.json.
  icon-translations:
    status: done
  reconfiguration-flow:
    status: done
    comment: Options flow updates meter size and the cost opt-in; reauth
      updates the password.
  repair-issues:
    status: todo
    comment: Planned — raise a Repairs issue when the portal's HTML chart
      format changes (parse yields no series) so the user is told to update
      the integration, rather than silently degrading. Reauth is already
      surfaced by HA itself.
  stale-devices:
    status: done
    comment: The single account device is removed when the entry is removed.

  # Platinum (deferred for v0.1)
  async-dependency:
    status: todo
    comment: The portal scraper uses synchronous requests run on the executor.
      An async (aiohttp) rewrite is deferred until the parse layer stabilizes.
  inject-websession:
    status: todo
    comment: The scraper owns its own requests.Session for the ColdFusion
      token/cookie chain; injecting HA's aiohttp session waits on the async
      rewrite.
  strict-typing:
    status: todo
    comment: mypy --strict is not yet wired into CI for v0.1; the cost/tariff
      and statistics layers are annotated but not strict-clean end to end.
